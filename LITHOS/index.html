<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithos — Explore Earth's hidden layers</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }

        /* Hero animations */
        @keyframes heroReveal {
            0% { opacity: 0; transform: translateY(28px); filter: blur(12px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes heroFadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes heroZoom {
            0% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        .hero-anim {
            opacity: 0;
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-reveal { animation-name: heroReveal; animation-duration: 1.1s; }
        .hero-fade { animation-name: heroFadeUp; animation-duration: 1s; }
        .hero-zoom { animation: heroZoom 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @media (prefers-reduced-motion: reduce) {
            .hero-anim, .hero-zoom { animation: none; opacity: 1; }
        }

        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 0; background: #000; }

        .mobile-menu-enter { opacity: 0; transform: translateY(-12px); }
        .mobile-menu-active { opacity: 1; transform: translateY(0); transition: opacity 0.25s ease, transform 0.25s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // ──────────────────────────────
        // Lucide‑like SVG icons
        // ──────────────────────────────
        const IconMenu = ({ size = 24 }) => (

                <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
            </svg>
        );
        const IconX = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );
        const IconArrowRight = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
        );
        const IconMap = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

            </svg>

        const IconClock = ({ size = 24 }) => (

        const IconLayers = ({ size = 24 }) => (

                <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/>
            </svg>
        );
        const IconMail = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>

            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>

        // ──────────────────────────────
        // Constants
        // ──────────────────────────────
        const SPOTLIGHT_R = 260;
        const BG_IMAGE_1 = 'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260609_195923_b0ba8ace-1d1d-4f2c-9a28-1ab84b330680.png&w=1280&q=85';
        const BG_IMAGE_2 = 'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260609_201152_bba90a12-bf12-459f-91f0-51f237dbaf3b.png&w=1280&q=85';

        // ──────────────────────────────
        // Navigation
        // ──────────────────────────────
        function Nav() {
            const [mobileOpen, setMobileOpen] = useState(false);
            const closeMobile = useCallback(() => setMobileOpen(false), []);

            const navLinks = ['About', 'Features', 'Maps', 'Pricing', 'Contact'];

            return (

                    <div className="flex items-center gap-2.5 z-10">
                        <svg width="26" height="26" viewBox="0 0 256 256" fill="#ffffff">
                            <path d="M 256 256 L 128 256 L 0 128 L 128 128 Z M 256 128 L 128 128 L 0 0 L 128 0 Z" />
                        </svg>
                        <span className="text-white text-2xl font-playfair italic">Lithos</span>
                    </div>

                    {/* Center pill (desktop) */}
                    <div className="hidden md:flex absolute left-1/2 -translate-x-1/2 bg-white/20 backdrop-blur-md border border-white/30 rounded-full px-2 py-2 items-center gap-1">
                        {navLinks.map((item, i) => {
                            const isActive = i === 0;
                            return (

                                    key={item}
                                    href={`#${item.toLowerCase()}`}
                                    className={`px-4 py-1.5 rounded-full text-sm font-medium transition-colors ${
                                        isActive
                                            ? 'text-white'
                                            : 'text-white/80 hover:bg-white/20 hover:text-white'
                                    }`}
                                >

                                </a>
                            );
                        })}
                    </div>

                    {/* Right CTA (desktop) */}
                    <a
                        href="#contact"
                        className="hidden md:block bg-white text-gray-900 text-sm font-semibold px-6 py-2.5 rounded-full hover:bg-gray-100 transition-colors z-10"
                    >
                        Get Started
                    </a>

                    {/* Hamburger (mobile) */}
                    <button
                        className="md:hidden text-white z-10 p-1"
                        onClick={() => setMobileOpen(prev => !prev)}
                        aria-label="Toggle menu"
                    >
                        {mobileOpen ? <IconX size={26} /> : <IconMenu size={26} />}
                    </button>

                    {/* Mobile menu */}
                    <div
                        className={`absolute top-full left-0 right-0 mt-2 mx-4 p-4 bg-black/90 backdrop-blur-xl border border-white/20 rounded-2xl flex flex-col gap-2 md:hidden ${
                            mobileOpen ? 'mobile-menu-active' : 'mobile-menu-enter pointer-events-none'
                        }`}
                        style={{ zIndex: 99 }}
                    >
                        {navLinks.map((item, i) => {
                            const isActive = i === 0;
                            return (
                                <a
                                    key={item}
                                    href={`#${item.toLowerCase()}`}
                                    onClick={closeMobile}
                                    className={`text-left px-4 py-2.5 rounded-full text-sm font-medium transition-colors ${
                                        isActive
                                            ? 'text-white bg-white/15'
                                            : 'text-white/80 hover:bg-white/15 hover:text-white'
                                    }`}
                                >

                                </a>

                        <div className="border-t border-white/15 my-1"></div>
                        <a
                            href="#contact"
                            onClick={closeMobile}
                            className="bg-white text-gray-900 text-sm font-semibold px-6 py-2.5 rounded-full hover:bg-gray-100 transition-colors text-center"
                        >
                            Get Started
                        </a>
                    </div>
                </nav>
            );
        }

        // ──────────────────────────────
        // Spotlight reveal layer (canvas mask)
        // ──────────────────────────────
        function RevealLayer({ image, cursorX, cursorY }) {
            const canvasRef = useRef(null);
            const revealDivRef = useRef(null);
            const [canvasSize, setCanvasSize] = useState({
                width: window.innerWidth,
                height: window.innerHeight,
            });

            useEffect(() => {
                const handleResize = () => {
                    setCanvasSize({ width: window.innerWidth, height: window.innerHeight });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const canvas = canvasRef.current;
                const revealDiv = revealDivRef.current;
                if (!canvas || !revealDiv) return;

                canvas.width = canvasSize.width;
                canvas.height = canvasSize.height;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const cx = cursorX;
                const cy = cursorY;

                if (cx > -500 && cy > -500) {
                    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, SPOTLIGHT_R);
                    gradient.addColorStop(0, 'rgba(255,255,255,1)');
                    gradient.addColorStop(0.4, 'rgba(255,255,255,1)');
                    gradient.addColorStop(0.6, 'rgba(255,255,255,0.75)');
                    gradient.addColorStop(0.75, 'rgba(255,255,255,0.4)');
                    gradient.addColorStop(0.88, 'rgba(255,255,255,0.12)');
                    gradient.addColorStop(1, 'rgba(255,255,255,0)');

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(cx, cy, SPOTLIGHT_R, 0, Math.PI * 2);
                    ctx.fill();
                }

                const dataUrl = canvas.toDataURL();
                revealDiv.style.maskImage = `url(${dataUrl})`;
                revealDiv.style.webkitMaskImage = `url(${dataUrl})`;
                revealDiv.style.maskSize = '100% 100%';
                revealDiv.style.webkitMaskSize = '100% 100%';
                revealDiv.style.maskRepeat = 'no-repeat';
                revealDiv.style.webkitMaskRepeat = 'no-repeat';
            }, [cursorX, cursorY, canvasSize.width, canvasSize.height, image]);

            return (
                <>
                    <canvas
                        ref={canvasRef}
                        className="absolute inset-0 pointer-events-none"
                        style={{ display: 'none' }}
                    />
                    <div
                        ref={revealDivRef}
                        className="absolute inset-0 bg-center bg-cover bg-no-repeat z-30 pointer-events-none"
                        style={{ backgroundImage: `url(${image})` }}
                    />
                </>
            );
        }

        // ──────────────────────────────
        // Hero Section (with own mouse tracking)
        // ──────────────────────────────
        function HeroSection() {
            const mouseRef = useRef({ x: -999, y: -999 });
            const smoothRef = useRef({ x: -999, y: -999 });
            const rafRef = useRef(null);
            const [cursorPos, setCursorPos] = useState({ x: -999, y: -999 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    mouseRef.current.x = e.clientX;
                    mouseRef.current.y = e.clientY;
                };

                const animate = () => {
                    const m = mouseRef.current;
                    const s = smoothRef.current;
                    s.x += (m.x - s.x) * 0.1;
                    s.y += (m.y - s.y) * 0.1;
                    setCursorPos({ x: s.x, y: s.y });
                    rafRef.current = requestAnimationFrame(animate);
                };

                window.addEventListener('mousemove', handleMouseMove, { passive: true });
                rafRef.current = requestAnimationFrame(animate);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    if (rafRef.current) cancelAnimationFrame(rafRef.current);
                };
            }, []);

            return (
                <section className="relative w-full overflow-hidden h-screen bg-black" style={{ height: '100dvh' }}>
                    {/* Base image */}
                    <div
                        className="absolute inset-0 bg-center bg-cover bg-no-repeat z-10 hero-zoom"
                        style={{ backgroundImage: `url(${BG_IMAGE_1})` }}
                    />

                    {/* Reveal layer */}
                    <RevealLayer image={BG_IMAGE_2} cursorX={cursorPos.x} cursorY={cursorPos.y} />

                    {/* Headline */}
                    <div className="absolute top-[14%] left-0 right-0 flex flex-col items-center text-center px-5 pointer-events-none z-50">
                        <h1 className="text-white leading-[0.95]">
                            <span
                                className="block font-playfair italic font-normal text-5xl sm:text-7xl md:text-8xl hero-anim hero-reveal"
                                style={{ letterSpacing: '-0.05em', animationDelay: '0.25s' }}
                            >
                                Layers hold
                            </span>
                            <span
                                className="block font-normal text-5xl sm:text-7xl md:text-8xl -mt-1 hero-anim hero-reveal"
                                style={{ letterSpacing: '-0.08em', animationDelay: '0.42s' }}
                            >
                                tales of time
                            </span>
                        </h1>
                    </div>

                    {/* Bottom left text */}
                    <div
                        className="hidden sm:block absolute bottom-14 left-10 md:left-14 max-w-[260px] z-50 hero-anim hero-fade"
                        style={{ animationDelay: '0.7s' }}
                    >
                        <p className="text-sm text-white/80 leading-relaxed">
                            Every layer of sediment records a chapter of our planet, from ancient seabeds to drifting ash,
                            layered across millions of years beneath us.
                        </p>
                    </div>

                    {/* Bottom right CTA */}
                    <div
                        className="absolute bottom-10 sm:bottom-24 left-5 right-5 sm:left-auto sm:right-10 md:right-14 max-w-full sm:max-w-[260px] flex flex-col items-start gap-4 sm:gap-5 z-50 hero-anim hero-fade"
                        style={{ animationDelay: '0.85s' }}
                    >
                        <p className="text-xs sm:text-sm text-white/80 leading-relaxed">
                            Our interactive maps let you peel back the crust to trace how stones, fossils, and deep time
                            combine to shape the ground beneath your feet.
                        </p>
                        <a
                            href="#maps"
                            className="bg-[#e8702a] hover:bg-[#d2611f] text-white text-sm font-medium px-7 py-3 rounded-full transition-all hover:scale-[1.03] active:scale-95 hover:shadow-lg hover:shadow-[#e8702a]/30 inline-flex items-center gap-2"
                        >
                            Start Digging
                            <IconArrowRight size={16} />
                        </a>
                    </div>
                </section>
            );
        }

        // ──────────────────────────────
        // Features Section
        // ──────────────────────────────
        function FeaturesSection() {
            const features = [
                {
                    icon: <IconMap size={28} />,
                    title: 'Interactive Maps',
                    desc: 'Explore high‑resolution geological maps that let you pan through strata as if you were in the field.',
                },
                {
                    icon: <IconLayers size={28} />,
                    title: 'Fossil Records',
                    desc: 'Uncover fossil databases linked to each layer, showing what lived when and where.',
                },
                {
                    icon: <IconClock size={28} />,
                    title: 'Deep Time Scale',
                    desc: 'Travel across eons with our custom timeline — see how continents shifted and life evolved.',
                },
            ];

            return (
                <section id="features" className="py-24 px-5 bg-gray-950 text-white">
                    <div className="max-w-6xl mx-auto">
                        <h2 className="text-4xl md:text-5xl font-playfair italic text-center mb-16">
                            Explore Earth’s hidden archives
                        </h2>
                        <div className="grid md:grid-cols-3 gap-10">
                            {features.map((f, i) => (
                                <div key={i} className="bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl p-8 hover:bg-white/10 transition-colors">
                                    <div className="text-[#e8702a] mb-4">{f.icon}</div>
                                    <h3 className="text-xl font-semibold mb-3">{f.title}</h3>
                                    <p className="text-white/70 leading-relaxed">{f.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ──────────────────────────────
        // About / Split Section
        // ──────────────────────────────
        function AboutSection() {
            return (
                <section id="about" className="py-24 px-5 bg-black text-white">
                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-12">
                        <div className="md:w-1/2">
                            <img
                                src={BG_IMAGE_1}
                                alt="Geological layer"
                                className="rounded-2xl shadow-2xl w-full h-auto object-cover"
                            />
                        </div>
                        <div className="md:w-1/2 space-y-6">
                            <h2 className="text-4xl md:text-5xl font-playfair italic">
                                The story beneath your feet
                            </h2>
                            <p className="text-white/70 leading-relaxed">
                                Lithos was born from a passion for reading Earth’s diary. We combine satellite imagery,
                                field data, and machine learning to create the most immersive geological experience ever
                                built — right in your browser.
                            </p>
                            <p className="text-white/70 leading-relaxed">
                                Whether you're a student, a researcher, or just endlessly curious, our tools let you peel
                                back time and see the forces that shaped our world.
                            </p>
                            <a
                                href="#maps"
                                className="inline-block bg-[#e8702a] hover:bg-[#d2611f] text-white text-sm font-medium px-7 py-3 rounded-full transition-all hover:scale-[1.03]"

                            </a>
                        </div>
                    </div>
                </section>
            );
        }

        // ──────────────────────────────
        // Pricing Section
        // ──────────────────────────────
        function PricingSection() {
            const plans = [
                {
                    name: 'Starter',

                    desc: 'Basic access to maps and fossil records.',

                    name: 'Explorer',

                    features: ['All map layers', 'High resolution exports', 'Deep time slider', 'Priority support'],

            return (

                        </h2>

                        </p>
                        <div className="grid md:grid-cols-3 gap-8">
                            {plans.map((plan, i) => (

                                    key={i}

                                        </span>

                                    <h3 className="text-2xl font-semibold mb-2">{plan.name}</h3>
                                    <div className="text-4xl font-playfair italic mb-4">
                                        {plan.price}<span className="text-lg text-white/40">/mo</span>
                                    </div>
                                    <p className="text-white/60 mb-6">{plan.desc}</p>
                                    <ul className="space-y-3 mb-8 flex-1">

                                            <li key={idx} className="flex items-center gap-2 text-sm text-white/80">

                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />
                                                </svg>
                                                {feat}
                                            </li>
                                        ))}
                                    </ul>
                                    <button
                                        className={`w-full py-3 rounded-full font-medium transition-all ${
                                            plan.popular
                                                ? 'bg-[#e8702a] hover:bg-[#d2611f] text-white'
                                                : 'bg-white/10 hover:bg-white/20 text-white'
                                        }`}
                                    >

                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ──────────────────────────────
        // Contact Section
        // ──────────────────────────────
        function ContactSection() {
            return (
                <section id="contact" className="py-24 px-5 bg-black text-white">
                    <div className="max-w-4xl mx-auto text-center">
                        <h2 className="text-4xl md:text-5xl font-playfair italic mb-6">Get in touch</h2>
                        <p className="text-white/60 mb-12">
                            Questions, collaborations, or just want to say hello? We read every message.
                        </p>
                        <div className="grid md:grid-cols-2 gap-8 text-left">
                            <div className="space-y-6">
                                <div className="flex items-center gap-3">
                                    <IconMail size={20} className="text-[#e8702a]" />
                                    <span className="text-white/80">hello@lithos.earth</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <IconPhone size={20} className="text-[#e8702a]" />
                                    <span className="text-white/80">+1 (555) 123-4567</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <IconMap size={20} className="text-[#e8702a]" />
                                    <span className="text-white/80">1600 Amphitheatre Parkway, CA</span>
                                </div>
                            </div>
                            <form className="space-y-4">
