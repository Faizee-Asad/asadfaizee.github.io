<!DOCTYPE html>
<html lang="en" class="scroll-smooth" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninjutsu Creative — World-Class Digital Collective</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/8b75d9dcff6a48c35a46656192adf019?family=FSP+DEMO+-+PODIUM+Sharp+4.11">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        podium: ['"FSP DEMO - PODIUM Sharp 4.11"', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-up': 'fade-up 0.8s ease-out forwards',
                        'fade-up-delay-1': 'fade-up 0.8s ease-out 0.2s forwards',
                        'fade-up-delay-2': 'fade-up 0.8s ease-out 0.4s forwards',
                        'fade-up-delay-3': 'fade-up 0.8s ease-out 0.6s forwards',
                        'fade-up-delay-4': 'fade-up 0.8s ease-out 0.8s forwards',
                        'fade-in': 'fade-in 0.6s ease-out forwards',
                        'fade-in-delay': 'fade-in 0.6s ease-out 0.3s forwards',
                        'scale-in': 'scale-in 0.5s ease-out forwards',
                    },
                    keyframes: {
                        'fade-up': {
                            'from': {
                                opacity: '0',
                                transform: 'translateY(30px)'
                            },
                            'to': {
                                opacity: '1',
                                transform: 'translateY(0)'
                            },
                        },
                        'fade-in': {
                            'from': {
                                opacity: '0'
                            },
                            'to': {
                                opacity: '1'
                            },
                        },
                        'scale-in': {
                            'from': {
                                opacity: '0',
                                transform: 'scale(0.9)'
                            },
                            'to': {
                                opacity: '1',
                                transform: 'scale(1)'
                            },
                        },
                    },
                },
            },
        }
    </script>

    <style>
        /* Base styles */
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Custom animation base states */
        .animate-fade-up,
        .animate-fade-up-delay-1,
        .animate-fade-up-delay-2,
        .animate-fade-up-delay-3,
        .animate-fade-up-delay-4 {
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .animate-fade-in,
        .animate-fade-in-delay {
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .animate-scale-in {
            opacity: 0;
            animation-fill-mode: forwards;
        }

        /* Video fallback */
        video::-webkit-media-controls {
            display: none !important;
        }

        video::-webkit-media-controls-enclosure {
            display: none !important;
        }

        /* Smooth overlay transitions */
        .menu-overlay-enter {
            opacity: 0;
            visibility: hidden;
        }

        .menu-overlay-exit {
            opacity: 1;
            visibility: visible;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Selection */
        ::selection {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>
<body>

        const Target = ({ className = "w-6 h-6", ...props }) => (

        const Globe = ({ className = "w-6 h-6", ...props }) => (

        // Navbar Component

        const Navbar = ({ isScrolled, onMenuToggle, menuOpen }) => {
            const navLinks = [

            return (
                <nav
                    className={`fixed top-0 left-0 right-0 z-40 transition-all duration-500 ${

                                window.scrollTo({ top: 0, behavior: 'smooth' });

                                    key={link.label}
                                    href={link.href}

                        </div>

        // ──────────────────────────────────────
        // Mobile Menu Overlay
        // ──────────────────────────────────────
        const MobileMenu = ({ isOpen, onClose }) => {
            const navLinks = [
                { label: 'Projects', href: '#projects' },
                { label: 'Studio', href: '#studio' },
                { label: 'Offerings', href: '#offerings' },
                { label: 'Inquire', href: '#inquire' },
            ];

            const handleLinkClick = (href) => {
                onClose();
                setTimeout(() => {
                    const el = document.querySelector(href);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 400);
            };

            return (
                <div
                    className={`fixed inset-0 z-50 bg-black/95 backdrop-blur-sm flex flex-col transition-all duration-500 ${
                        isOpen ? 'opacity-100 visible' : 'opacity-0 invisible'
                    }`}
                >
                    {/* Header row */}
                    <div className="flex items-center justify-between px-6 sm:px-10 py-5 lg:py-7">
                        <span className="font-podium text-white font-bold uppercase text-2xl sm:text-3xl tracking-wider select-none">
                            Ninjutsu Creative
                        </span>
                        <button
                            onClick={onClose}
                            className="p-2 -mr-2 focus:outline-none"
                            aria-label="Close menu"
                        >
                            <X className="w-7 h-7 text-white" />
                        </button>
                    </div>

                    {/* Centered nav links */}
                    <div className="flex-1 flex flex-col items-center justify-center gap-6 -mt-12">
                        {navLinks.map((link, i) => (
                            <a
                                key={link.label}
                                href={link.href}
                                onClick={(e) => {
                                    e.preventDefault();
                                    handleLinkClick(link.href);
                                }}
                                className="font-podium text-4xl sm:text-5xl text-white uppercase transition-all duration-500"
                                style={{
                                    transitionDelay: isOpen ? `${i * 80 + 100}ms` : '0ms',
                                    opacity: isOpen ? 1 : 0,
                                    transform: isOpen ? 'translateY(0)' : 'translateY(20px)',
                                }}
                            >
                                {link.label}
                            </a>
                        ))}

                        {/* GET IN TOUCH button */}
                        <a
                            href="#inquire"
                            onClick={(e) => {
                                e.preventDefault();
                                handleLinkClick('#inquire');
                            }}
                            className="mt-4 inline-flex items-center gap-2 border border-white/40 hover:border-white/70 px-7 py-4 text-sm tracking-widest uppercase font-inter text-white hover:bg-white/10 transition-all duration-300"
                            style={{
                                transitionDelay: isOpen ? `${navLinks.length * 80 + 100}ms` : '0ms',
                                opacity: isOpen ? 1 : 0,
                                transform: isOpen ? 'translateY(0)' : 'translateY(20px)',

                    >

                            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260606_154941_df1a96e1-a06f-450c-bd02-d863414cc1a0.mp4"

        // ──────────────────────────────────────
        // Main App Component
        // ──────────────────────────────────────
        const App = () => {
            const [menuOpen, setMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const handleMenuToggle = useCallback(() => {
                setMenuOpen((prev) => !prev);
            }, []);

            const handleMenuClose = useCallback(() => {
                setMenuOpen(false);
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 60);
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                handleScroll(); // Check initial state

                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Prevent body scroll when mobile menu is open
            useEffect(() => {
                if (menuOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
                return () => {
                    document.body.style.overflow = '';
                };
            }, [menuOpen]);

            return (
                <div className="relative min-h-screen bg-black text-white antialiased">
                    <Navbar
                        isScrolled={isScrolled}
                        onMenuToggle={handleMenuToggle}
                        menuOpen={menuOpen}
                    />
                    <MobileMenu isOpen={menuOpen} onClose={handleMenuClose} />
                    <HeroSection />
                    <ProjectsSection />
                    <StudioSection />
                    <OfferingsSection />
                    <InquireSection />
                    <Footer />
                </div>
            );
        };

        // ──────────────────────────────────────
        // Render
        // ──────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
